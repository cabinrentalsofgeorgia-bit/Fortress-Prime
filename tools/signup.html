<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — CROG Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:20px}
.container{max-width:500px;width:100%}
.logo{text-align:center;margin-bottom:40px}
.logo h1{font-size:28px;font-weight:700;margin-bottom:8px}
.logo p{font-size:14px;color:#888}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:40px;
  box-shadow:0 8px 32px rgba(0,0,0,.5)}
h2{font-size:20px;margin-bottom:8px;text-align:center}
.subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-size:14px;color:#aaa;font-weight:500}
input{width:100%;padding:14px;background:#1a1a1a;border:1px solid #333;
  border-radius:10px;color:#fff;font-size:15px;transition:all .2s}
input:focus{outline:none;border-color:#0a84ff;box-shadow:0 0 0 3px rgba(10,132,255,.1)}
.hint{font-size:12px;color:#666;margin-top:6px}
.btn{width:100%;padding:15px;background:#0a84ff;color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;
  transition:all .2s;margin-top:8px}
.btn:hover{background:#0070f3;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:#333;cursor:not-allowed;transform:none}
.alert{padding:12px;border-radius:8px;margin-bottom:20px;font-size:14px;display:none}
.alert.error{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3);color:#ff453a}
.alert.success{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.3);color:#30d158}
.alert.show{display:block}
.footer{text-align:center;margin-top:24px;font-size:14px;color:#666}
.footer a{color:#0a84ff;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:500px){
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🏰 CROG Command Center</h1>
    <p>Cabin Rentals of Georgia</p>
  </div>
  
  <div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Join CROG Command Center</p>
    
    <div id="alert" class="alert"></div>
    
    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" minlength="3" required>
        <div class="hint">3-50 characters</div>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="8" required>
        <div class="hint">Minimum 8 characters</div>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">Create Account</button>
    </form>
  </div>

  <div class="footer">
    Already have an account? <a href="/login">Sign In</a>
  </div>
</div>

<script>
function showAlert(message, type = 'error') {
  const alert = document.getElementById('alert');
  alert.textContent = message;
  alert.className = `alert ${type} show`;
}

function setLoading(loading) {
  const btn = document.getElementById('submitBtn');
  const inputs = document.querySelectorAll('input');
  btn.disabled = loading;
  btn.textContent = loading ? 'Creating account...' : 'Create Account';
  inputs.forEach(input => input.disabled = loading);
}

async function handleSignup(e) {
  e.preventDefault();
  
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (password !== confirmPassword) {
    showAlert('Passwords do not match', 'error');
    return;
  }
  
  if (password.length < 8) {
    showAlert('Password must be at least 8 characters', 'error');
    return;
  }
  
  setLoading(true);
  
  try {
    const response = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        first_name: firstName,
        last_name: lastName,
        username: username,
        email: email,
        password: password
      })
    });
    
    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.detail || 'Registration failed');
    }
    
    showAlert('Account created successfully! Redirecting to login...', 'success');
    setTimeout(() => {
      window.location.href = '/login';
    }, 2000);
    
  } catch (error) {
    console.error('Signup error:', error);
    showAlert(error.message || 'Registration failed', 'error');
    setLoading(false);
  }
}
</script>

</body>
</html>
