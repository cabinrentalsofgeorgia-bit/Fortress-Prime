# =============================================================================
# FORTRESS PRIME — Fortress Legal API Gateway (standalone Nginx)
# =============================================================================
# Unified OpenAI-compatible endpoint for chat + embeddings across 4 nodes.
# Start: nginx -c /path/to/fortress_legal_gateway.conf
# Stop:  fuser -k -9 8090/tcp  OR  pkill -f "nginx.*fortress_legal_gateway"
#
# Routing:
#   POST /v1/chat/completions  -> least_conn to 10.10.10.{1-4}:8081
#   POST /v1/embeddings        -> least_conn to 10.10.10.{1-4}:8082
#   GET  /v1/models            -> least_conn to chat upstream
#   GET  /health               -> 200 OK
# =============================================================================

worker_processes 1;
error_log /tmp/fortress_legal_gateway_error.log warn;
pid /tmp/fortress_legal_gateway.pid;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/fortress_legal_gateway_access.log;
    default_type application/octet-stream;

    # Fortress Legal — chat (llama-server :8081 on each node)
    upstream fortress_legal_chat {
        least_conn;
        server 10.10.10.1:8081;
        server 10.10.10.2:8081;
        server 10.10.10.3:8081;
        server 10.10.10.4:8081;
    }

    # Fortress Legal — embeddings (llama-server :8082 on each node)
    upstream fortress_legal_embed {
        least_conn;
        server 10.10.10.1:8082;
        server 10.10.10.2:8082;
        server 10.10.10.3:8082;
        server 10.10.10.4:8082;
    }

    server {
        listen 8090;
        server_name _;

        # Health check (gateway itself)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # OpenAI-compat: chat completions
        location /v1/chat/completions {
            proxy_pass http://fortress_legal_chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }

        # OpenAI-compat: embeddings
        location /v1/embeddings {
            proxy_pass http://fortress_legal_embed;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }

        # List models (forward to chat upstream)
        location /v1/models {
            proxy_pass http://fortress_legal_chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_buffering off;
        }

        # Catch-all v1 for any other OpenAI-compat (e.g. completions) -> chat
        location /v1/ {
            proxy_pass http://fortress_legal_chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }
    }
}
