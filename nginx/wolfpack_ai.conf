# =============================================================================
# FORTRESS PRIME — Wolfpack Load Balancer (The Hive Mind)
# =============================================================================
# Dual-purpose: AI inference load balancing + Next.js reverse proxy.
#
# ROUTING DOCTRINE (effective 2026-02-27):
#   Next.js owns ALL browser traffic (UI + API via BFF).
#   The BFF catch-all (src/app/api/[...path]/route.ts) routes /api/* to the
#   correct backend (FGP :8100 or Command Center :9800).
#   Nginx does NOT make per-path API routing decisions for crog-ai.com.
#
# API Usage (programmatic — unchanged):
#   SWARM (fast):  curl http://192.168.0.100/v1/chat/completions ...
#   HYDRA (deep):  curl http://192.168.0.100/hydra/v1/chat/completions ...
#   Embed:         curl http://192.168.0.100/api/embeddings ...
#
# Browser:         http://192.168.0.100 → Command Center (LAN only)
#                  https://crog-ai.com  → Next.js Frontend (production)
#                  https://crog-ai.com/console/ → Legacy Command Center
# =============================================================================

# --- Primary Upstream: All 4 Ollama Engines ---
upstream wolfpack_cluster {
    least_conn;

    server 192.168.0.100:11434;  # Captain   (Ollama)
    server 192.168.0.104:11434;  # Muscle    (Ollama — DGX)
    server 192.168.0.105:11434;  # Ocular    (Ollama — GB10)
    server 192.168.0.106:11434;  # Sovereign (Ollama — GB10)
}

# --- Hydra Upstream: R1-70B Deep Reasoning ---
upstream hydra_cluster {
    least_conn;

    server 192.168.0.104:11434;  # Muscle    — R1-70B loaded (57GB VRAM)
    server 192.168.0.105:11434;  # Ocular    — R1-70B loaded (102GB VRAM)
    server 192.168.0.106:11434;  # Sovereign — R1-70B loaded (102GB VRAM)
}

# --- Embedding Upstream: Nodes with nomic-embed-text ---
upstream wolfpack_embed {
    least_conn;
    server 192.168.0.100:11434;  # Captain   — 33ms, model pre-loaded
    server 192.168.0.104:11434;  # Muscle    — 1.7s
    server 192.168.0.105:11434;  # Ocular    — 1.7s
    server 192.168.0.106:11434;  # Sovereign — has nomic-embed-text
}

# --- Heavy Upstream: NIM Brain (Qwen3-32B on Captain only) ---
upstream nim_brain {
    server 192.168.0.100:8010;
}

# --- Command Center ---
upstream command_center {
    server 127.0.0.1:9800;
}

# --- Fortress Guest Platform ---
upstream guest_platform {
    server 127.0.0.1:8100;
}

# --- CROG Gateway ---
upstream crog_gateway {
    server 127.0.0.1:8001;
}

# --- System Health Dashboard (bare-metal-dashboard on :9876) ---
upstream health_panel {
    server 127.0.0.1:9876;
}

# --- Next.js Frontend (CROG-VRS React Dashboard) ---
upstream nextjs_frontend {
    server 127.0.0.1:3001;
}

# =============================================================================
# Default Server — IP-based access (192.168.0.100 / localhost)
# Browser → Command Center | API paths → Ollama Cluster
# This server block is UNTOUCHED — LAN-only access for internal tools.
# =============================================================================
server {
    listen 80 default_server;
    server_name _;

    # ── Ollama: OpenAI-compatible API ──
    location /v1/ {
        proxy_pass http://wolfpack_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Ollama: Native API (generate, chat, tags, show, etc.) ──
    location /api/ {
        proxy_pass http://wolfpack_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Embedding: Dedicated route for nomic-embed-text ──
    location = /api/embeddings {
        proxy_pass http://wolfpack_embed/api/embeddings;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Hydra: R1-70B Deep Reasoning ──
    location /hydra/ {
        rewrite ^/hydra/(.*) /$1 break;
        proxy_pass http://hydra_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── NIM Brain: Heavy model (Qwen3-32B) ──
    location /nim/ {
        rewrite ^/nim/(.*) /$1 break;
        proxy_pass http://nim_brain;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── System Health Panel ──
    location /health-panel/ {
        proxy_pass http://health_panel/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check ──
    location = /health {
        return 200 'Wolfpack Online — SWARM+HYDRA';
        add_header Content-Type text/plain;
    }

    # ── Default: Command Center (browser users hitting the IP on LAN) ──
    location / {
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }
}


# =============================================================================
# FORTRESS PRIME — crog-ai.com — HTTP
# =============================================================================
# Cloudflare tunnel terminates SSL and delivers traffic here over HTTP.
#
# ROUTING TABLE (complete):
#   /webhooks/*          → Command Center :9800  (machine-to-machine)
#   /platform/*          → FGP Backend :8100     (legacy webhook compat)
#   /console/*           → Command Center :9800  (legacy escape hatch)
#   /health-panel/*      → Bare-Metal :9876      (monitoring)
#   /_next/*             → Next.js :3001          (static assets)
#   /api/*               → Next.js :3001          (BFF routes to correct backend)
#   /*                   → Next.js :3001          (all UI routes)
# =============================================================================
server {
    listen 80;
    server_name crog-ai.com www.crog-ai.com;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Stripe Webhook (legacy /platform path rewrite) ──
    location = /platform/api/payments/webhook {
        rewrite ^ /api/webhooks/stripe break;
        proxy_pass http://guest_platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ── FGP direct access (legacy /platform path) ──
    location /platform/ {
        proxy_pass http://guest_platform/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Webhooks (machine-to-machine, NOT browser traffic) ──
    location = /webhooks/sms/incoming {
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
        proxy_buffering off;
    }

    location /webhooks/ {
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
        proxy_buffering off;
    }

    # ── ALL /api/* → Next.js BFF ──
    # The BFF catch-all (src/app/api/[...path]/route.ts) routes each request
    # to the correct backend: FGP :8100 or Command Center :9800.
    # Dedicated BFF routes handle /api/auth/*, /api/legal/council/stream, etc.
    # NO per-path API routing in nginx. The BFF IS the router.
    location /api/ {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ── System Health Panel (monitoring) ──
    location /health-panel/ {
        proxy_pass http://health_panel/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Legacy Command Center (escape hatch at /console/) ──
    location /console/ {
        rewrite ^/console(/.*)$ $1 break;
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Script-Name /console;
        proxy_redirect ~^/(.*) /console/$1;
        proxy_cookie_path / /console/;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # ── Next.js Static Assets ──
    location /_next/ {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Next.js owns ALL UI routes ──
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── Health Check ──
    location = /health {
        return 200 'Fortress Online — Next.js Frontend';
        add_header Content-Type text/plain;
    }
}


# =============================================================================
# FORTRESS PRIME — crog-ai.com — HTTPS
# =============================================================================
# Same routing as HTTP above. Cloudflare tunnel uses HTTP, but direct HTTPS
# access is also supported via self-signed cert.
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name crog-ai.com www.crog-ai.com;

    ssl_certificate     /etc/nginx/ssl/fortress.crt;
    ssl_certificate_key /etc/nginx/ssl/fortress.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/fortress_console_access.log;
    error_log /var/log/nginx/fortress_console_error.log;

    # ── Stripe Webhook (legacy /platform path rewrite) ──
    location = /platform/api/payments/webhook {
        rewrite ^ /api/webhooks/stripe break;
        proxy_pass http://guest_platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ── FGP direct access (legacy /platform path) ──
    location /platform/ {
        proxy_pass http://guest_platform/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Webhooks (machine-to-machine, NOT browser traffic) ──
    location = /webhooks/sms/incoming {
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
        proxy_buffering off;
    }

    location /webhooks/ {
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
        proxy_buffering off;
    }

    # ── ALL /api/* → Next.js BFF ──
    location /api/ {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ── System Health Panel (monitoring) ──
    location /health-panel/ {
        proxy_pass http://health_panel/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Legacy Command Center (escape hatch at /console/) ──
    location /console/ {
        rewrite ^/console(/.*)$ $1 break;
        proxy_pass http://command_center;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /console;
        proxy_redirect ~^/(.*) /console/$1;
        proxy_cookie_path / /console/;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # ── Next.js Static Assets ──
    location /_next/ {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Next.js owns ALL UI routes ──
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── Health Check ──
    location = /health {
        return 200 'Fortress Online — HTTPS + Next.js';
        add_header Content-Type text/plain;
    }
}
