# =============================================================================
# FORTRESS PRIME — Wolfpack Load Balancer (HYDRA MODE — DEFCON 3)
# =============================================================================
# Routes inference to 4x NVIDIA NIM instances (DeepSeek-R1-70B).
# Each node runs a NIM container on port 8000 (OpenAI-compatible).
#
# Usage: curl http://localhost/v1/chat/completions ...
#
# NOTE: Embeddings are NOT available in HYDRA mode (Ollama is stopped).
# If you need embeddings, use SWARM mode or run a dedicated embed service.
# =============================================================================

# --- Primary Upstream: All 4 NIM Engines (DeepSeek-R1-70B) ---
upstream hydra_cluster {
    least_conn;

    server 192.168.0.100:8000;  # Captain   (NIM R1-70B)
    server 192.168.0.104:8000;  # Muscle    (NIM R1-70B)
    server 192.168.0.105:8000;  # Ocular    (NIM R1-70B)
    server 192.168.0.106:8000;  # Sovereign (NIM R1-70B)
}

server {
    listen 80;
    server_name _;

    # ── Default: Hydra Cluster (all 4 NIM heads) ──
    location / {
        proxy_pass http://hydra_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # NIM 70B inference — generous timeouts for deep reasoning
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;    # R1-70B may need 5+ min for complex queries
        proxy_send_timeout 60s;

        # Streaming support (NIM supports SSE)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ── Embedding: NOT AVAILABLE in HYDRA mode ──
    location /api/embeddings {
        return 503 '{"error": "Embeddings not available in HYDRA mode. Switch to SWARM."}';
        add_header Content-Type application/json;
    }

    # ── Health Check ──
    location /health {
        return 200 'Wolfpack Online — HYDRA Mode (4x NIM R1-70B)';
        add_header Content-Type text/plain;
    }

    # ── NIM Health Passthrough ──
    # Direct health check to verify NIM is ready
    location /v1/models {
        proxy_pass http://hydra_cluster/v1/models;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
