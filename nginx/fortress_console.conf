# =============================================================================
# FORTRESS PRIME — Master Console (crog-ai.com)
# =============================================================================
# Central portal for all Fortress Prime GUIs.
# Proxies to the Master Console FastAPI app on port 9800.
#
# NOTE: This server block is also included in wolfpack_ai.conf (which is the
# file bind-mounted into the wolfpack-lb Docker container). This file exists
# as a standalone reference. To apply changes, edit wolfpack_ai.conf and
# reload the container: docker exec wolfpack-lb nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name crog-ai.com www.crog-ai.com;

    # Access Logs specific to the console
    access_log /var/log/nginx/fortress_console_access.log;
    error_log /var/log/nginx/fortress_console_error.log;

    # ── SMS Webhooks (Twilio -> Guest Agent in Master Console) ──
    location /webhooks/ {
        proxy_pass http://127.0.0.1:9800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts for webhooks
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── CROG Gateway API Endpoints ──
    location /api/messages/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reservations/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Master Console Portal ──
    location / {
        proxy_pass http://127.0.0.1:9800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE to work
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # SSE long-polling timeout
        proxy_read_timeout 86400s;
    }

    # ── Health Check ──
    location /health {
        return 200 'Fortress Console Online';
        add_header Content-Type text/plain;
    }
}
