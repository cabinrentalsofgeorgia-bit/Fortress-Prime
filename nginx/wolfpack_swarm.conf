# =============================================================================
# FORTRESS PRIME — Wolfpack Load Balancer (SWARM MODE — DEFCON 5)
# =============================================================================
# Routes AI inference requests across all 4 GPU nodes running Ollama.
# Captain also has NIM (Qwen3-32B) on :8010 as a separate upstream.
#
# Usage: curl http://localhost/v1/chat/completions ...
# =============================================================================

# --- Primary Upstream: All 4 Ollama Engines ---
upstream wolfpack_cluster {
    least_conn;

    server 192.168.0.100:11434;  # Captain  (Ollama)
    server 192.168.0.104:11434;  # Muscle   (Ollama — DGX, has 32b too)
    server 192.168.0.105:11434;  # Ocular   (Ollama — GB10)
    server 192.168.0.106:11434;  # Sovereign (Ollama — GB10)
}

# --- Embedding Upstream: Nodes with nomic-embed-text ---
upstream wolfpack_embed {
    least_conn;
    server 192.168.0.100:11434;  # Captain  — 33ms
    server 192.168.0.104:11434;  # Muscle   — 1.7s
    server 192.168.0.105:11434;  # Ocular   — 1.7s
}

# --- Heavy Upstream: NIM Brain (Qwen3-32B on Captain only) ---
upstream nim_brain {
    server 192.168.0.100:8010;
}

server {
    listen 80;
    server_name _;

    # ── Default: Wolfpack Cluster (all 4 GPUs) ──
    location / {
        proxy_pass http://wolfpack_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── Embedding: Dedicated route ──
    location /api/embeddings {
        proxy_pass http://wolfpack_embed/api/embeddings;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── NIM Brain: Heavy model (Qwen3-32B) ──
    location /nim/ {
        rewrite ^/nim/(.*) /$1 break;
        proxy_pass http://nim_brain;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 60s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health Check ──
    location /health {
        return 200 'Wolfpack Online — SWARM Mode';
        add_header Content-Type text/plain;
    }
}
