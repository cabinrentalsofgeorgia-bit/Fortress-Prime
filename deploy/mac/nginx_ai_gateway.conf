# CROG AI Gateway — Nginx least_conn load balancer for DGX Spark inference
# Listens on 8090; master_console.py proxies AI requests here.
# Tier 1 SOTA — REQUIREMENTS.md Section 2.1

worker_processes 1;
error_log /var/log/crog/ai_gateway_error.log warn;
pid /tmp/crog_ai_gateway.pid;

events {
    worker_connections 256;
}

http {
    # Apple Silicon: /opt/homebrew. Intel Homebrew: change to /usr/local/etc/nginx/mime.types
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Upstream: DGX Spark fleet (Management LAN IPs per REQUIREMENTS.md 1.1)
    # Inference ports 8081/8082 — adjust if your Ollama/llama.cpp listen on different ports
    upstream sparks {
        least_conn;
        server 192.168.0.100:8081 max_fails=2 fail_timeout=30s;   # Captain (primary)
        server 192.168.0.104:8082 max_fails=2 fail_timeout=30s backup; # Muscle
        server 192.168.0.107:8081 max_fails=2 fail_timeout=30s backup; # Ocular
        server 192.168.0.108:8081 max_fails=2 fail_timeout=30s backup; # Sovereign
    }

    server {
        listen 8090;
        server_name localhost;

        access_log /var/log/crog/ai_gateway_access.log;
        error_log  /var/log/crog/ai_gateway_error.log;

        location / {
            proxy_pass http://sparks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
