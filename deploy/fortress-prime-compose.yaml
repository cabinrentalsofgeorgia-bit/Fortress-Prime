services:
  fortress-backend:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && python run.py"
    volumes:
      - ../fortress-guest-platform:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://fgp_app:fortress2024@postgres:5432/fortress_guest
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LITELLM_BASE_URL: http://litellm:4000/v1
      OLLAMA_BASE_URL: http://captain:11434
      AUDIT_LOG_SIGNING_KEY: ${AUDIT_LOG_SIGNING_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8100:8100"
    depends_on:
      - postgres
      - redis
      - qdrant
      - litellm

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fortress_guest
      POSTGRES_USER: fgp_app
      POSTGRES_PASSWORD: fortress2024
    volumes:
      - fortress_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: fortress-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - fortress_qdrant_data:/qdrant/storage

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    env_file:
      - ./.env.litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    ports:
      - "4000:4000"

volumes:
  fortress_postgres_data:
  fortress_qdrant_data:
