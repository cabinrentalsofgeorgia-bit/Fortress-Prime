apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    app.kubernetes.io/instance: paperclip
    app.kubernetes.io/name: paperclip
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/instance: paperclip
      app.kubernetes.io/name: paperclip
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: paperclip
        app.kubernetes.io/name: paperclip
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: spark-node-2
      terminationGracePeriodSeconds: 30
      containers:
        - name: paperclip
          image: paperclip-local:v2026.325.0
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: paperclip-config
            - secretRef:
                name: paperclip-runtime
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: paperclip-home
              mountPath: /paperclip
      volumes:
        - name: paperclip-home
          persistentVolumeClaim:
            claimName: paperclip-home
