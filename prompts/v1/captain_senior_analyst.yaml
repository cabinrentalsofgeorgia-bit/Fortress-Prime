name: Captain Senior Analyst
version: v1
division: command
description: >
  Default system role for The Captain (DeepSeek-R1 on Spark 2).
  Senior Analyst persona with deep financial history context.
  Used by captain_think() in config.py and the Streamlit dashboard.

