# =============================================================================
# PROMETHEUS — Metrics Collection
# =============================================================================
# Scrapes metrics from Fortress services, Ollama nodes, and system exporters.
# Retention: 15 days local. Grafana reads from here.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting (Alertmanager — future Phase)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  # --- Fortress Gateway ---
  - job_name: "fortress-gateway"
    metrics_path: /health
    static_configs:
      - targets: ["fortress-gateway:8000"]
        labels:
          service: gateway
          division: infrastructure

  # --- PostgreSQL (via pg_exporter — future) ---
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # --- Ollama Captain (Spark 2) ---
  - job_name: "ollama-captain"
    metrics_path: /api/tags
    scrape_interval: 30s
    static_configs:
      - targets: ["192.168.0.100:11434"]
        labels:
          node: captain
          role: reasoning

  # --- Ollama Muscle (Spark 1) ---
  - job_name: "ollama-muscle"
    metrics_path: /api/tags
    scrape_interval: 30s
    static_configs:
      - targets: ["192.168.0.104:11434"]
        labels:
          node: muscle
          role: vision

  # --- Loki (self-monitoring) ---
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  # --- Node Exporter (host metrics — if installed) ---
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          node: captain
    # Don't fail if node_exporter isn't installed
    honor_labels: true

  # --- Guest Platform (FastAPI) ---
  - job_name: "guest-platform"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8100"]
        labels:
          service: guest-platform
          division: operations

  # --- Prometheus self-monitoring ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
