# =============================================================================
# GRAFANA DASHBOARD PROVISIONING — Fortress Prime
# =============================================================================
# Automatically loads all JSON dashboards from /var/lib/grafana/dashboards/
# on Grafana startup. Dashboards are read-only (editable: false) in the UI
# to enforce infrastructure-as-code. Clone to make edits.
# =============================================================================

apiVersion: 1

providers:
  - name: Fortress Prime
    orgId: 1
    folder: Fortress Prime
    folderUid: fortress-prime
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
