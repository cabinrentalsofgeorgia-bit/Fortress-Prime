name: Fortress CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fortress-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-gate:
    name: e2e-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fortress_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fortress_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_API_URI: ${{ secrets.POSTGRES_API_URI }}
      POSTGRES_ADMIN_URI: ${{ secrets.POSTGRES_ADMIN_URI }}
      SWARM_API_KEY: ${{ secrets.SWARM_API_KEY }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      JWT_RSA_PRIVATE_KEY: ${{ secrets.JWT_RSA_PRIVATE_KEY }}
      JWT_RSA_PUBLIC_KEY: ${{ secrets.JWT_RSA_PUBLIC_KEY }}
      AUDIT_LOG_SIGNING_KEY: ${{ secrets.AUDIT_LOG_SIGNING_KEY }}
      EDGE_REVALIDATION_SECRET: ${{ secrets.EDGE_REVALIDATION_SECRET }}
      FGP_BACKEND_URL: http://127.0.0.1:8100
      E2E_BACKEND_URL: http://127.0.0.1:8100
      E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8100
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_TELEMETRY_DISABLED: "1"
      BOOTSTRAP_ADMIN_PASSWORD: FortressPrime2026!
      BOOTSTRAP_ADMIN_CONFIRM_PASSWORD: FortressPrime2026!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: fortress-guest-platform/frontend-next/package-lock.json

      - name: Assert required CI secrets
        run: |
          missing=0
          for key in POSTGRES_API_URI POSTGRES_ADMIN_URI SWARM_API_KEY INTERNAL_API_KEY JWT_RSA_PRIVATE_KEY JWT_RSA_PUBLIC_KEY AUDIT_LOG_SIGNING_KEY; do
            if [[ -z "${!key}" ]]; then
              echo "::error::$key is required for fortress-ci"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: fortress-guest-platform/frontend-next
        run: npm ci

      - name: Build Next.js storefront
        working-directory: fortress-guest-platform/frontend-next
        run: npm run build

      - name: Install Playwright browsers
        working-directory: fortress-guest-platform/frontend-next
        run: npx playwright install --with-deps chromium

      - name: Start FastAPI backend
        working-directory: fortress-guest-platform
        run: |
          source "$GITHUB_WORKSPACE/.venv/bin/activate"
          nohup python run.py > "$RUNNER_TEMP/fortress-backend.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/fortress-backend.pid"

      - name: Wait for backend readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8100/docs > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::FastAPI backend did not become ready on 127.0.0.1:8100"
          exit 1

      - name: Seed deterministic CI admin
        working-directory: fortress-guest-platform
        run: |
          source "$GITHUB_WORKSPACE/.venv/bin/activate"
          python backend/scripts/seed_master_admin.py

      - name: Start Next.js storefront
        working-directory: fortress-guest-platform/frontend-next
        run: |
          nohup npx next start --hostname 127.0.0.1 --port 3000 > "$RUNNER_TEMP/fortress-frontend.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/fortress-frontend.pid"

      - name: Wait for storefront readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Next.js storefront did not become ready on 127.0.0.1:3000"
          exit 1

      - name: Run Playwright
        working-directory: fortress-guest-platform/frontend-next
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-playwright-report
          path: fortress-guest-platform/frontend-next/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-playwright-results
          path: fortress-guest-platform/frontend-next/test-results
          if-no-files-found: ignore

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortress-ci-logs
          path: |
            ${{ runner.temp }}/fortress-backend.log
            ${{ runner.temp }}/fortress-frontend.log
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: |
          if [[ -f "$RUNNER_TEMP/fortress-frontend.pid" ]]; then
            kill "$(cat "$RUNNER_TEMP/fortress-frontend.pid")" || true
          fi
          if [[ -f "$RUNNER_TEMP/fortress-backend.pid" ]]; then
            kill "$(cat "$RUNNER_TEMP/fortress-backend.pid")" || true
          fi
