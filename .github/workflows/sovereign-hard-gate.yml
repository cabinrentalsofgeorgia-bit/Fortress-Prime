name: Sovereign Hard Gate

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hard-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fortress_shadow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fortress_shadow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_API_URI: postgresql+asyncpg://fortress_api:fortress_api@127.0.0.1:5432/fortress_shadow
      POSTGRES_ADMIN_URI: postgresql://fortress_admin:fortress_admin@127.0.0.1:5432/fortress_shadow
      DATABASE_URL: postgresql+asyncpg://fortress_api:fortress_api@127.0.0.1:5432/fortress_shadow
      SWARM_API_KEY: ${{ secrets.SWARM_API_KEY }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      AUDIT_LOG_SIGNING_KEY: ${{ secrets.AUDIT_LOG_SIGNING_KEY }}
      FOCUSED_SMOKE_BASE_URL: http://127.0.0.1:8115
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert sovereign secrets are present
        run: |
          missing=0
          for key in SWARM_API_KEY INTERNAL_API_KEY AUDIT_LOG_SIGNING_KEY; do
            if [[ -z "${!key}" ]]; then
              echo "::error::$key is required for the sovereign hard gate"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt alembic

      - name: Provision sovereign CI database roles
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d fortress_shadow -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'fortress_admin') THEN
              CREATE ROLE fortress_admin LOGIN PASSWORD 'fortress_admin';
            ELSE
              ALTER ROLE fortress_admin WITH LOGIN PASSWORD 'fortress_admin';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'fortress_api') THEN
              CREATE ROLE fortress_api LOGIN PASSWORD 'fortress_api';
            ELSE
              ALTER ROLE fortress_api WITH LOGIN PASSWORD 'fortress_api';
            END IF;
          END
          $$;
          GRANT ALL PRIVILEGES ON DATABASE fortress_shadow TO fortress_admin;
          GRANT CONNECT, TEMPORARY ON DATABASE fortress_shadow TO fortress_api;
          GRANT USAGE, CREATE ON SCHEMA public TO fortress_api;
          GRANT USAGE, CREATE ON SCHEMA public TO fortress_admin;
          ALTER SCHEMA public OWNER TO fortress_admin;
          ALTER DEFAULT PRIVILEGES FOR ROLE fortress_admin IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO fortress_api;
          ALTER DEFAULT PRIVILEGES FOR ROLE fortress_admin IN SCHEMA public
            GRANT USAGE, SELECT ON SEQUENCES TO fortress_api;
          SQL

      - name: Run hosted hard-gate fallback preflight
        run: |
          source "$GITHUB_WORKSPACE/.venv/bin/activate"
          PYTHONPATH="$GITHUB_WORKSPACE/fortress-guest-platform" python -c "import backend.main; print('backend import ok')"
          python3 -m pytest -q fortress-guest-platform/backend/tests/test_focused_smoke.py -k redaction

      - name: Document hosted fallback scope
        run: |
          echo "Hosted hard-gate fallback ran import and privacy smoke coverage."
          echo "Full DGX fabric and live focused-smoke execution still require a registered spark-head self-hosted runner."
