      bloom:
        - "Etsy"
        - "watercolor"
        - "card"
        - "print"
        - "design"
        - "art"
        - "Verses"
        - "Bloom"
        - "Printful"
      legal:
        - "contract"
        - "lawsuit"
        - "liability"
        - "regulation"
        - "compliance"
        - "zoning"
        - "easement"
        - "deed"
        - "title"
        - "attorney"
        - "clause"
        - "dispute"
      fgp:
        - "reservation"
        - "guest"
        - "check-in"
        - "check-out"
        - "housekeeping"
        - "cleaning"
        - "damage claim"
        - "damage waiver"
        - "owner balance"
