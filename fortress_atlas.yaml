# =============================================================================
# FORTRESS PRIME — Division Atlas (The Corporate Map)
# =============================================================================
# This file is the single source of truth for the Fortress org chart.
# Every agent, every script, every query MUST consult this atlas to determine
# which Sector owns the data, which schema to write to, and which model
# profile to use.
#
# Routing Rule: The Titan Executive (master_router.py) reads this file at
#               startup and uses it to dispatch queries to the correct
#               sector agent. Cross-sector access is FORBIDDEN unless
#               explicitly routed through the Sovereign.
#
# Amendment IV: In TITAN mode, all sectors share one DeepSeek-R1 context
#               window. The atlas controls the system prompt injection
#               so the Titan knows which "hat" to wear.
# =============================================================================

fortress_prime:
  version: "Titan Class"
  stakeholder: "Gary Mitchell Knight"
  constitution: "CONSTITUTION.md"
  requirements: "REQUIREMENTS.md"
  cursor_rules:
    - ".cursor/rules/000-enterprise-constitution.mdc"
    - ".cursor/rules/001-titan-protocol.mdc"
    - ".cursor/rules/002-sovereign-constitution.mdc"
    - ".cursor/rules/003-legal-command-center.mdc"
    - ".cursor/rules/004-quality-gate.mdc"
    - ".cursor/rules/005-fortress-guest-platform.mdc"
    - ".cursor/rules/006-security-compliance.mdc"
    - ".cursor/rules/007-financial-data-governance.mdc"
    - ".cursor/rules/008-api-integration-standards.mdc"
    - ".cursor/rules/009-testing-deployment.mdc"

  # =========================================================================
  # SECTOR 01: CROG — Cabin Rentals of Georgia (Property Management)
  # =========================================================================
  sectors:
    - slug: "crog"
      name: "Cabin Rentals of Georgia"
      code: "S01"
      persona: "The Controller"
      model_bias: "Operational / Customer Service / Hospitality"
      description: >
        Revenue-generating flagship. Manages 36 rental properties across
        Blue Ridge and Fannin County, GA. Handles guest communications,
        maintenance dispatch, pricing optimization, and trust accounting.

      # THE TAYLOR STANDARD (Constitutional Mandate — see 000-enterprise-constitution.mdc III.A-1)
      # Taylor Knight is the sovereign voice of CROG. All guest-facing AI MUST:
      #   1. Access the Voice Data Pipeline (outbound SMS → Taylor emails → CROG staff emails → templates)
      #   2. Match her attributes: warm, welcoming, authoritative, bright, polished, southern hospitality
      #   3. Use VERIFIED property data (WiFi, door codes) — NEVER fabricate
      #   4. Feed Taylor's edits back through the recursive learning loop
      voice_standard: "Taylor Knight — Blue Ridge Vacation Specialist"
      voice_attributes:
        - "Warm and genuinely welcoming"
        - "Authoritative with grace — knows everything, delivers it with kindness"
        - "Bright and solutions-oriented — anticipates guest needs"
        - "Top-shelf writing — clean, polished, effortless prose"
        - "Southern hospitality, elevated — friendly, genuine, unhurried"
      voice_data_pipeline:
        - table: "message_archive"
          filter: "direction = 'outbound'"
          priority: 1
          description: "1,542+ real SMS responses — primary voice reference (same medium)"
        - table: "email_archive"
          filter: "sender ILIKE '%taylor.knight@cabin-rentals-of-georgia.com%'"
          priority: 2
          description: "866+ Taylor emails — bookings, follow-ups, rental agreements"
        - table: "email_archive"
          filter: "sender ILIKE '%@cabin-rentals-of-georgia.com%' (guest-facing only)"
          priority: 3
          description: "12,300+ CROG staff emails — full team voice library"
        - table: "ruebarue_message_templates"
          priority: 4
          description: "20 official templates with verified WiFi, door codes, gate codes"
        - table: "agent_response_queue"
          filter: "edited_draft IS NOT NULL"
          priority: 5
          description: "Taylor's real-time corrections — recursive learning input"
      voice_implementation:
        agent: "src/guest_agent.py"
        prompt: "prompts/v1/guest_sms_agent.yaml"
        retriever: "KnowledgeRetriever.get_taylor_voice_exemplars()"
        learning_endpoint: "POST /api/guest-agent/learning/apply"

      # Data Sources
      db_schema: "division_b"
      db_tables:
        - "division_b.escrow"
        - "division_b.vendor_payouts"
        - "division_b.trust_ledger"
        - "division_b.transactions"
        - "division_b.predictions"
        - "division_b.chart_of_accounts"
        - "division_b.general_ledger"
        - "division_b.journal_entries"
        - "division_b.account_mappings"
        - "public.ops_properties"
        - "public.ops_turnovers"
        - "public.ops_tasks"
        - "public.maintenance_log"
        - "public.guest_leads"
        - "public.fin_reservations"
        - "public.fin_revenue_snapshots"
        - "public.fin_owner_balances"
        - "public.message_archive"
        - "public.agent_response_queue"
        - "public.agent_learning_log"
        - "public.guest_profiles"
        - "public.property_sms_config"
        - "public.ruebarue_message_templates"
        - "public.ruebarue_knowledge_base"
        - "public.ruebarue_area_guide"

      qdrant_collections:
        - "email_embeddings"      # Filtered by division = 'REAL_ESTATE'

      email_divisions:
        - "REAL_ESTATE"

      code_modules:
        - "division_b_property/"
        - "cabins/"
        - "src/guest_agent.py"
        - "src/guest_reply_engine.py"
        - "src/listing_doctor.py"

      nas_paths:
        - "/mnt/fortress_nas/Communications/"
        - "/mnt/fortress_nas/Business_Prime/"

      integrations:
        - name: "Streamline VRS"
          type: "PMS (Property Management System)"
          bridge: "src/bridges/streamline_legacy_connect.py"
        - name: "Plaid"
          type: "Banking API"
          bridge: "division_b_property/plaid_client.py"
        - name: "RueBaRue"
          type: "Guest Messaging Platform"
          bridge: "src/guest_agent.py"
        - name: "Twilio"
          type: "SMS Gateway"
          bridge: "fortress-sms/"

      firewall: "NEVER access division_a or hedge_fund schemas."

    # =========================================================================
    # SECTOR 02: DEV — Real Estate Development
    # =========================================================================
    - slug: "dev"
      name: "Fortress Development"
      code: "S02"
      persona: "The Architect (CF-10)"
      model_bias: "Technical / Engineering / Construction"
      description: >
        Active real estate development operations. Lot 9 construction,
        septic engineering, surveyor coordination, permit tracking.
        Manages the full lifecycle from land acquisition to Certificate
        of Occupancy.

      db_schema: "engineering"
      db_tables:
        - "engineering.projects"
        - "engineering.drawings"
        - "engineering.permits"
        - "engineering.inspections"
        - "engineering.mep_systems"
        - "engineering.compliance_log"
        - "engineering.change_orders"
        - "engineering.rfis"
        - "engineering.submittals"
        - "engineering.punch_items"
        - "engineering.cost_estimates"
        - "public.properties"
        - "public.asset_docs"
        - "public.property_events"
        - "public.real_estate_intel"

      qdrant_collections:
        - "email_embeddings"      # Filtered by division = 'REAL_ESTATE'

      email_divisions:
        - "REAL_ESTATE"

      code_modules:
        - "division_engineering/"
        - "division_real_estate/"

      nas_paths:
        - "/mnt/fortress_nas/Business_Prime/"

      integrations:
        - name: "County GIS"
          type: "Property Records"
          bridge: null              # Manual for now

      firewall: "Read-only access to division_b for property cross-reference. No write."

    # =========================================================================
    # SECTOR 03: COMP — Fortress Comptroller (Finance)
    # =========================================================================
    - slug: "comp"
      name: "Fortress Comptroller"
      code: "S03"
      persona: "The CFO / Venture Capitalist"
      model_bias: "Analytical / Financial / Tax Optimization"
      description: >
        Enterprise-wide financial oversight. Mirrors QuickBooks Online
        into Postgres double-entry ledger. Tracks cash flow across all
        divisions, monitors Gold/BTC positions, optimizes tax strategy.
        Challenges every transaction.

      db_schema: "division_a"
      db_tables:
        - "division_a.transactions"
        - "division_a.predictions"
        - "division_a.audit_log"
        - "division_a.chart_of_accounts"
        - "division_a.general_ledger"
        - "division_a.journal_entries"
        - "division_a.account_mappings"
        - "hedge_fund.market_signals"
        - "hedge_fund.watchlist"
        - "hedge_fund.active_strategies"
        - "hedge_fund.extraction_log"
        - "public.market_intel"
        - "public.revenue_ledger"
        - "public.finance_invoices"
        - "public.trust_balance"

      qdrant_collections:
        - "email_embeddings"      # Filtered by division = 'HEDGE_FUND'

      email_divisions:
        - "HEDGE_FUND"

      code_modules:
        - "division_a_holding/"
        - "division_finance/"
        - "accounting/"
        - "src/cfo_extractor.py"
        - "src/quant_revenue.py"
        - "src/market_sentinel.py"
        - "src/market_watcher.py"
        - "src/mining_rig_trader.py"

      nas_paths:
        - "/mnt/fortress_nas/Financial_Ledger/"

      integrations:
        - name: "QuickBooks Online"
          type: "Accounting"
          bridge: "accounting/import_qbo_coa.py"
        - name: "Plaid"
          type: "Banking API"
          bridge: "division_a_holding/plaid_client.py"

      firewall: >
        READ access to division_b (for consolidated reporting).
        WRITE only to division_a and hedge_fund schemas.
        Revenue from CROG and Bloom must be strictly categorized for
        distinct tax treatment (per Constitution Section III.C).

    # =========================================================================
    # SECTOR 04: BLOOM — Verses in Bloom (Digital Retail)
    # =========================================================================
    - slug: "bloom"
      name: "Verses in Bloom"
      code: "S04"
      status: "planned"
      persona: "The Artisan"
      model_bias: "Creative / Market Trends / E-Commerce"
      description: >
        High-margin, low-friction digital retail. Watercolor greeting
        cards and art prints sold via Etsy and Print-on-Demand. Zero
        physical inventory liability. Future: AI-generated art via
        "The Ocular" (Spark-03 vision pipeline).

      db_schema: null               # No dedicated schema yet
      db_tables:
        - "public.sales_intel"

      qdrant_collections: []        # Future: design_embeddings

      email_divisions:
        - "PERSONAL"                # Art-related comms currently classified here

      code_modules: []              # To be built

      nas_paths:
        - "/mnt/fortress_nas/Digital_Media/"

      integrations:
        - name: "Etsy API"
          type: "E-Commerce"
          bridge: null              # To be built
        - name: "Printful"
          type: "Print-on-Demand"
          bridge: null              # To be built

      firewall: "Isolated. Revenue data flows UP to COMP only."

    # =========================================================================
    # SECTOR 05: LEGAL — Fortress JD (Legal Intelligence)
    # =========================================================================
    - slug: "legal"
      name: "Fortress JD"
      code: "S05"
      persona: "The Counselor"
      model_bias: "Legal / Regulatory / Contract Analysis"
      description: >
        Legal intelligence across all divisions. Real estate law,
        septic regulations, zoning compliance, contract review,
        dispute resolution. Ingests county codes and case law into
        vector memory for RAG retrieval.

      db_schema: null               # Uses public schema
      db_tables:
        - "public.legal_matters"
        - "public.legal_clients"
        - "public.legal_docket"
        - "public.legal_intel"
        - "public.legal_matter_notes"

      qdrant_collections:
        - "legal_library"           # 2,455 vectors of legal documents
        - "email_embeddings"        # Filtered by division = 'LEGAL_ADMIN'

      email_divisions:
        - "LEGAL_ADMIN"

      code_modules:
        - "division_legal/"
        - "src/legal_analyst.py"
        - "src/legal_partner_r1.py"
        - "src/forensic_audit.py"
        - "src/agents/legal_sentinel.py"      # OODA Legal Sentinel (Counselor)
        - "src/agents/legal_steward.py"       # OODA Document Indexer (Steward)
        - "src/legal_api.py"                  # Gateway API router (/v1/legal)
        - "Modules/CF-03_CounselorCRM/"       # RAG engine (query + ingest)

      nas_paths:
        - "/mnt/fortress_nas/Corporate_Legal/"

      integrations:
        - "Qdrant legal_library (2,455+ vectors, nomic-embed-text 768-dim)"
        - "CF-03 CounselorCRM (RAG pipeline, query + ingest)"
        - "Thunderdome (adversarial legal swarm, ChromaDB law_library)"

      firewall: >
        READ access to ALL schemas (for contract cross-reference).

    # =========================================================================
    # SECTOR 06: FGP — Fortress Guest Platform (Guest Operations Engine)
    # =========================================================================
    - slug: "fgp"
      name: "Fortress Guest Platform"
      code: "S06"
      persona: "The Concierge"
      model_bias: "Guest Operations / Hospitality / Revenue Optimization"
      description: >
        Enterprise guest operations platform. Manages the full guest lifecycle:
        reservations, communications, housekeeping, damage claims, owner
        financials, and trust accounting. Integrates with Streamline VRS via
        9-phase sync engine. Replaces Streamline's UI with a sovereign system
        that owns the data.

      constitution: ".cursor/rules/005-fortress-guest-platform.mdc"
      security: ".cursor/rules/006-security-compliance.mdc"
      financial_governance: ".cursor/rules/007-financial-data-governance.mdc"

      db_name: "fortress_guest"
      db_user: "fgp_app"
      db_tables:
        - "properties"               # 14 rental cabins with Streamline IDs
        - "reservations"             # 2,650+ bookings with financial detail
        - "guests"                   # 2,975+ CRM profiles with scoring
        - "messages"                 # SMS/email communication log
        - "message_templates"        # Auto-response templates
        - "scheduled_messages"       # Timed message queue
        - "rental_agreements"        # 2,141 per-reservation agreements
        - "agreement_templates"      # Agreement content templates
        - "damage_claims"            # Damage reporting + AI legal drafts
        - "housekeeping_tasks"       # Cleaning schedule (Streamline sync)
        - "work_orders"              # Maintenance tickets
        - "guest_reviews"            # Bidirectional review system (19 Streamline)
        - "guest_surveys"            # Post-stay surveys with NPS
        - "owner_statements"         # Monthly owner payout reports
        - "trust_balance"            # Per-property owner fund balances
        - "extra_orders"             # Upsell/add-on purchases
        - "guest_verifications"      # Identity verification records
        - "guest_activities"         # CRM activity log
        - "analytics_events"         # Behavioral telemetry
        - "knowledge_base_entries"   # RAG knowledge for AI agents
        - "staff_users"              # Staff accounts with RBAC
        - "staff_invites"            # Staff onboarding tokens
        - "property_utilities"       # Utility provider tracking
        - "utility_readings"         # Usage/cost readings
        - "agent_response_queue"     # AI draft review queue

      services:
        backend:
          port: 8100
          framework: "FastAPI + SQLAlchemy (async)"
          location: "fortress-guest-platform/backend/"
        frontend:
          port: 3001
          framework: "Next.js 14 + shadcn/ui"
          location: "fortress-guest-platform/frontend-next/"

      integrations:
        streamline_vrs:
          api_url: "https://web.streamlinevrs.com/api/json"
          protocol: "JSON-RPC"
          company_id: 796
          sync_interval_seconds: 300
          sync_phases: 9
          methods_available: 20
          methods_restricted: 7
        twilio:
          purpose: "Guest SMS communication"
          webhook: "/api/webhooks/twilio"
        ai_models:
          legal_drafting: "HYDRA (R1-70B) → SWARM (qwen2.5:7b) → OpenAI (gpt-4o)"
          guest_agent: "SWARM (qwen2.5:7b) with Taylor Voice Pipeline"

      data_inventory:
        reservations_total: 2650
        guests_total: 2975
        properties_total: 14
        agreements_total: 2141
        reviews_total: 19
        housekeeping_tasks: 23
        notes_with_data: 494
        financial_enriched: 391
        owner_balances: 14
        owners_mapped: 12

      api_endpoints:
        total: 26
        categories:
          damage_claims: 6
          integrations: 16
          owner_portal: 8

      code_modules:
        - "fortress-guest-platform/backend/api/"
        - "fortress-guest-platform/backend/models/"
        - "fortress-guest-platform/backend/services/"
        - "fortress-guest-platform/backend/integrations/streamline_vrs.py"
        - "fortress-guest-platform/backend/core/"
        - "fortress-guest-platform/frontend-next/src/"

      firewall: >
        FGP owns all data in the fortress_guest database. No other sector
        writes to fortress_guest. LEGAL sector has READ access for damage
        claim cross-reference. COMP sector has READ access for financial
        reporting. All other cross-sector access is FORBIDDEN.
        WRITE only to fortress_guest.* tables.

  # =========================================================================
  # ROUTING RULES (for the Titan Executive)
  # =========================================================================
  routing:
    precedence:
      - "fgp"
      - "crog"
      - "dev"
      - "comp"
      - "legal"
      - "bloom"

    disambiguation:
      fgp_if_contains_any:
        - "damage claim"
        - "damage waiver"
        - "trust accounting"
        - "rental agreement"
        - "twilio"
      crog_if_contains_any:
        - "blue ridge"
        - "fannin"
        - "property management"

    # Keywords and patterns that map to sectors
    keyword_hints:
      crog:
        - "cabin"
        - "rental"
        - "guest"
        - "reservation"
        - "booking"
        - "turnover"
        - "cleaning"
        - "maintenance"
