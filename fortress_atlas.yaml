    # Cross-division routing
    cross_sector_rules:
      - from: "any"
        to: "legal"
        condition: "Query mentions contracts, liability, or compliance"
        action: "Route to LEGAL with source-sector context"
      - from: "any"
        to: "comp"
        condition: "Query asks about money, revenue, or expenses"
        action: "Route to COMP with source-sector context"
      - from: "crog"
        to: "dev"
        condition: "Query about property improvements or construction on existing rentals"
        action: "Route to DEV with CROG property reference"
      - from: "fgp"
        to: "legal"
        condition: "Damage claim exceeds $500 or involves legal dispute"
        action: "Route to LEGAL with claim details and rental agreement"
      - from: "fgp"
        to: "comp"
        condition: "Query about owner payouts, trust reconciliation, or tax reporting"
        action: "Route to COMP with trust_balance and owner_statement data"
      - from: "crog"
        to: "fgp"
        condition: "Query about specific guest, reservation, or property operations"
        action: "Route to FGP with confirmation_code or property name"
      - from: "any"
        to: "fgp"
        condition: "Query mentions reservations, guests, housekeeping, or damage claims"
        action: "Route to FGP — it owns the fortress_guest database"
