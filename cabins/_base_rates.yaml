# =============================================================================
# CROG BASE RATE REGISTRY — Single Source of Truth for QuantRevenue (CF-02)
# =============================================================================
# This file defines the base nightly rate and pricing guardrails for every
# managed property.  The QuantRevenue engine reads this at runtime.
#
# Fields:
#   base_rate      - Default mid-season nightly rate ($)
#   tier           - premium | standard | economy  (affects seasonal amplitude)
#   floor_pct      - Minimum rate as % of base (e.g. 0.60 = never below 60%)
#   ceiling_pct    - Maximum rate as % of base (e.g. 2.00 = never above 200%)
#   cleaning_fee   - Flat per-stay cleaning fee ($)
#   min_nights     - Minimum stay (default 2)
#   notes          - Human notes about pricing rationale
#
# To override a rate temporarily, use the Intercom:
#   "Set target price for <property> to $X"
# That writes to ops_overrides and QuantRevenue respects it.
# =============================================================================

defaults:
  floor_pct: 0.60
  ceiling_pct: 2.00
  cleaning_fee: 150
  min_nights: 2
  tax_rate: 0.13        # GA state + Fannin County lodging tax
  mgmt_fee_pct: 0.25    # CROG management fee

