name = "crog-storefront-seo-worker"
main = "src/index.js"
compatibility_date = "2024-03-23"

# Staging Environment (Currently Active)
[env.staging]
route = { pattern = "staging.cabin-rentals-of-georgia.com/*", zone_name = "cabin-rentals-of-georgia.com" }
[env.staging.vars]
STOREFRONT_ORIGIN = "https://staging.cabin-rentals-of-georgia.com"
SEO_API_ORIGIN = "https://api.cabin-rentals-of-georgia.com"

# Production Environment (Shadow Mode)
[env.production]
# DO NOT UNCOMMENT THE ROUTE UNTIL DRUPAL IS DEAD
# route = { pattern = "cabin-rentals-of-georgia.com/*", zone_name = "cabin-rentals-of-georgia.com" }

# We can bind it to a shadow domain to test production Vercel + production DGX
route = { pattern = "beta.cabin-rentals-of-georgia.com/*", zone_name = "cabin-rentals-of-georgia.com" }

[env.production.vars]
# This MUST be your raw Vercel production URL, not the apex domain
STOREFRONT_ORIGIN = "https://cabin-rentals-of-georgia.vercel.app"
SEO_API_ORIGIN = "https://api.cabin-rentals-of-georgia.com"
